<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4kwallpaper - Stories Feed</title>
    <link rel="stylesheet" href="style.css">
    <script>
        if (localStorage.getItem("theme") === "dark") {
            document.documentElement.classList.add("dark-mode");
        }
    </script>
</head>
<body>

    <header class="navbar">
        <div class="navbar-content">
            <a href="index.html" class="logo-container">
                <svg class="logo-icon" xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path>
                    <polyline points="13 2 13 9 20 9"></polyline>
                </svg>
                <span class="logo-text">4kwallpaper</span>
            </a>

            <div class="nav-middle">
                <a href="#" class="nav-item">For you</a>
                <a href="#featured" class="nav-item active">Featured</a>
            </div>

            <div class="nav-actions">
                <button class="theme-toggle" id="themeToggle" aria-label="Toggle Dark Mode">
                    <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
            </div>
        </div>
        <div class="navbar-divider"></div>
    </header>

    <main class="main-container">
        <div class="feed-wrapper">
            <!-- LEFT SECTION: Posts Feed -->
            <section class="feed-section">
                <div id="postsFeed" class="posts-container">
                    <div class="loading-state">
                        <p>Loading stories...</p>
                    </div>
                </div>
            </section>

            <!-- RIGHT SECTION: Sidebar -->
            <aside class="sidebar">
                <!-- Search -->
                <div class="sidebar-box search-box">
                    <input type="text" id="sidebarSearch" placeholder="Search" class="search-input" autocomplete="off">
                </div>

                <!-- Staff Picks -->
                <div class="sidebar-box">
                    <h3 class="sidebar-title">Staff Picks</h3>
                    <div id="staffPicks" class="staff-picks-list">
                        <div class="loading-text">Loading...</div>
                    </div>
                </div>

                <!-- Recommended Topics -->
                <div class="sidebar-box">
                    <h3 class="sidebar-title">Recommended topics</h3>
                    <div class="topics-list">
                        <button class="topic-btn">+ Programming</button>
                        <button class="topic-btn">+ Technology</button>
                        <button class="topic-btn">+ Design</button>
                        <button class="topic-btn">+ Writing</button>
                    </div>
                </div>
            </aside>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2026 4kwallpaper</p>
            <div class="footer-links">
                <a href="#">About</a>
                <a href="#">Help</a>
                <a href="#">Terms</a>
                <a href="#">Privacy</a>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
