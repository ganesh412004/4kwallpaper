<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4kwallpaper - Post</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #191919;
            --text-light: #757575;
            --border: #e5e5e5;
        }
        html.dark-mode {
            --bg: #0a0a0a;
            --text: #f2f2f2;
            --text-light: #9c9c9c;
            --border: #2a2a2a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            transition: background 0.3s, color 0.3s;
        }
        .navbar {
            position: sticky;
            top: 0;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            z-index: 100;
        }
        .navbar-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            height: 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 20px;
            font-weight: 700;
            text-decoration: none;
            color: var(--text);
        }
        .theme-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: var(--text);
        }
        .main {
            max-width: 680px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .back-link {
            text-decoration: none;
            color: var(--text-light);
            margin-bottom: 30px;
            display: inline-block;
        }
        .back-link:hover {
            color: var(--text);
        }
        h1 {
            font-size: 42px;
            font-weight: 700;
            margin: 0 0 12px 0;
            line-height: 1.2;
        }
        .subtitle {
            font-size: 20px;
            color: var(--text-light);
            margin: 0 0 20px 0;
            line-height: 1.4;
        }
        .meta {
            font-size: 13px;
            color: var(--text-light);
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }
        .content {
            font-size: 18px;
            line-height: 1.7;
        }
        .content p {
            margin-bottom: 24px;
        }
        .loading {
            text-align: center;
            color: var(--text-light);
            padding: 40px 20px;
        }
        .error {
            background: #fee;
            color: #c33;
            padding: 16px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<header class="navbar">
    <div class="navbar-content">
        <a href="/" class="logo">📖 4kwallpaper</a>
        <button class="theme-btn" id="themeBtn">🌙</button>
    </div>
</header>

<main class="main">
    <div id="content">
        <div class="loading">Loading post...</div>
    </div>
</main>

<script>
const API_URL = 'https://api.github.com/repos/ganesh412004/4kwallpaper/contents/posts';
const content = document.getElementById('content');
const themeBtn = document.getElementById('themeBtn');
const html = document.documentElement;

const params = new URLSearchParams(window.location.search);
const filename = params.get('file');

themeBtn.addEventListener('click', () => {
    html.classList.toggle('dark-mode');
    localStorage.setItem('theme', html.classList.contains('dark-mode') ? 'dark' : 'light');
    themeBtn.textContent = html.classList.contains('dark-mode') ? '☀️' : '🌙';
});

if (localStorage.getItem('theme') === 'dark') {
    html.classList.add('dark-mode');
    themeBtn.textContent = '☀️';
}

async function loadPost() {
    if (!filename) {
        content.innerHTML = '<div class="error">❌ No post specified</div>';
        return;
    }
    
    try {
        const url = `${API_URL}/${encodeURIComponent(filename)}`;
        console.log('Fetching post from:', url);
        
        const res = await fetch(url);
        const fileData = await res.json();
        
        const postRes = await fetch(fileData.download_url);
        const post = await postRes.json();
        
        document.title = (post.title || 'Post') + ' - 4kwallpaper';
        
        const dateStr = post.date ? new Date(post.date).toLocaleDateString('en-US', {
            year: 'numeric', month: 'long', day: 'numeric'
        }) : 'Today';
        
        const readTime = Math.ceil((post.content || '').split(' ').length / 200);
        
        content.innerHTML = `
            <a href="/" class="back-link">← Back</a>
            <h1>${escapeHtml(post.title)}</h1>
            <p class="subtitle">${escapeHtml(post.subtitle)}</p>
            <div class="meta">${dateStr} • ${readTime} min read</div>
            <div class="content">${formatContent(post.content)}</div>
        `;
    } catch (e) {
        console.error('Error:', e);
        content.innerHTML = '<div class="error">❌ Failed to load post. Check console.</div>';
    }
}

function formatContent(text) {
    return (text || '')
        .split('\n')
        .map(line => `<p>${escapeHtml(line)}</p>`)
        .join('');
}

function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

loadPost();
</script>

</body>
</html>
